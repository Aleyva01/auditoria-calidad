<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoría de Producto Terminado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e0ddd4;--border2:#c8c5ba;--text:#1a1917;--text2:#6b6860;--text3:#9e9b92;--green:#2d6a4f;--green-bg:#d8f3dc;--amber:#7d4e00;--amber-bg:#fff3cd;--red:#7f1d1d;--red-bg:#fee2e2;--blue:#1e3a5f;--blue-bg:#dbeafe;--radius:10px;--radius-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
/* LOGIN */
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center;}
.login-logo{font-size:28px;font-weight:300;letter-spacing:-1px;margin-bottom:6px;}
.login-sub{font-size:13px;color:var(--text3);margin-bottom:2rem;font-family:'DM Mono',monospace;}
.login-card select,.login-card input{width:100%;padding:10px 14px;border:0.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);outline:none;margin-bottom:10px;}
.login-card .btn-full{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
.login-card .btn-full:hover{opacity:0.85;}
.login-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}
/* APP */
.app-shell{display:none;}
.topbar{background:var(--text);color:#fff;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
.topbar-sub{font-size:12px;opacity:0.5;font-family:'DM Mono',monospace;}
.topbar-right{display:flex;align-items:center;gap:8px;}
.tabs-bar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 2rem;display:flex;gap:0;overflow-x:auto;}
.tab-btn{padding:12px 18px;font-size:13px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-family:'DM Sans',sans-serif;white-space:nowrap;}
.tab-btn:hover{color:var(--text2);}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);}
.tab-btn.master-only{color:#a78a50;}
.tab-btn.master-only.active{color:#7d4e00;border-bottom-color:#7d4e00;}
.tab-panel{display:none;}
.tab-panel.active{display:block;}
.main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;font-family:'DM Mono',monospace;}
.stat-value{font-size:28px;font-weight:300;letter-spacing:-1px;}
.stat-sub{font-size:12px;color:var(--text3);margin-top:2px;}
/* FILTROS */
.filter-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;}
.pill{padding:5px 14px;border-radius:20px;font-size:12px;font-weight:500;cursor:pointer;border:0.5px solid var(--border);background:var(--surface);color:var(--text2);transition:all 0.15s;}
.pill:hover{border-color:var(--border2);}
.pill.active{background:var(--text);color:#fff;border-color:var(--text);}
.pill-label{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;margin-right:4px;align-self:center;}
/* CONTROLS */
.controls-bar{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
select{padding:9px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
.btn{padding:9px 18px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:all 0.15s;}
.btn-dark{background:var(--text);color:#fff;border-color:var(--text);}
.btn-sm{padding:5px 12px;font-size:12px;}
/* TABLE */
.table-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px;}
thead th{background:var(--surface2);padding:10px 14px;text-align:left;font-size:11px;color:var(--text3);text-transform:uppercase;border-bottom:0.5px solid var(--border);font-family:'DM Mono',monospace;cursor:pointer;}
tbody td{padding:10px 14px;border-bottom:0.5px solid var(--border);vertical-align:middle;}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}
.badge-green{background:var(--green-bg);color:var(--green);}
.badge-amber{background:var(--amber-bg);color:var(--amber);}
.badge-blue{background:var(--blue-bg);color:var(--blue);}
.badge-gray{background:var(--surface2);color:var(--text2);}
/* MODAL PDF */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:1rem;}
.overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:var(--radius);width:100%;max-width:820px;max-height:92vh;display:flex;flex-direction:column;}
.modal-head{padding:1rem 1.5rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.modal-body{overflow-y:auto;padding:1.5rem;flex:1;}
.modal-foot{padding:1rem 1.5rem;border-top:0.5px solid var(--border);display:flex;gap:8px;justify-content:flex-end;}
/* FORMATO IMPRESION */
#formato-print table{width:100%;border-collapse:collapse;font-family:Arial,sans-serif;}
#formato-print td{border:1px solid #555;padding:5px 8px;}
#formato-print .f-title{background:#111;color:#fff;text-align:center;font-weight:bold;padding:10px;}
#formato-print .lbl{background:#111;color:#fff;font-weight:bold;font-size:10px;text-transform:uppercase;}
/* ENCUESTA */
.encuesta-wrap{max-width:680px;margin:0 auto;}
.enc-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;}
.field{margin-bottom:1.25rem;}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;}
.field input, .field select, .field textarea{width:100%;padding:9px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);outline:none;}
.rating-row{display:flex;gap:8px;}
.rating-opt{flex:1;}
.rating-opt input{display:none;}
.rating-opt label{display:flex;align-items:center;justify-content:center;height:44px;border:0.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;}
.rating-opt input:checked+label{background:var(--text);color:#fff;}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.check-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:0.5px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;font-size:12px;}
.check-item.checked{border-color:var(--text);background:var(--bg);}
@media(max-width:700px){.stats-grid{grid-template-columns:repeat(2,1fr);}.check-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
  <div class="login-card">
    <div class="login-logo">Auditoría</div>
    <div class="login-sub">Producto Terminado · Calidad</div>
    <select id="login-user">
      <option value="">Selecciona tu nombre...</option>
      <option value="Admin">Admin (Maestro)</option>
      <option value="Eloisa">Eloisa</option>
      <option value="Luis">Luis</option>
      <option value="Arely">Arely</option>
      <option value="Equipo de calidad">Equipo de calidad</option>
    </select>
    <input type="password" id="login-pass" placeholder="Contraseña" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn-full" onclick="doLogin()">Ingresar</button>
    <div class="login-err" id="login-err">Error de acceso</div>
  </div>
</div>

<div class="app-shell" id="app-shell">
  <div class="topbar">
    <div>
      <div class="topbar-title">Auditoría de Producto Terminado</div>
      <div class="topbar-sub" id="topbar-user">Calidad</div>
    </div>
    <div class="topbar-right">
      <button class="btn btn-dark" onclick="loadData()" id="refresh-btn">↻ Actualizar</button>
      <button class="btn" style="color:#fff;border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);" onclick="doLogout()">Salir</button>
    </div>
  </div>

  <div class="tabs-bar" id="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('registros',this)">Registros</button>
    <button class="tab-btn" onclick="switchTab('encuesta',this)">Nueva auditoría</button>
    <button class="tab-btn master-only" id="tab-btn-dashboard" style="display:none;" onclick="switchTab('dashboard',this)">📊 Dashboard</button>
    <button class="tab-btn master-only" id="tab-btn-config" style="display:none;" onclick="switchTab('config',this)">Configuración</button>
  </div>

  <div class="tab-panel active" id="tab-registros">
    <div class="main">
      <div id="alert-area"></div>
      <div class="stats-grid" id="stats" style="display:none;">
        <div class="stat-card"><div class="stat-label">Total registros</div><div class="stat-value" id="s-total">0</div></div>
        <div class="stat-card"><div class="stat-label">Promedio</div><div class="stat-value" id="s-avg">—</div></div>
        <div class="stat-card"><div class="stat-label">Maquileros</div><div class="stat-value" id="s-maq">0</div></div>
        <div class="stat-card"><div class="stat-label">Este mes</div><div class="stat-value" id="s-mes">0</div></div>
      </div>
      <div class="controls-bar" id="controls" style="display:none;">
        <div class="search-wrap"><input type="text" id="search" placeholder="Buscar..." oninput="filterData()"></div>
        <select id="filter-maq" onchange="filterData()"><option value="">Todos los maquileros</option></select>
        <span class="count-label" id="count-label"></span>
      </div>
      <div id="table-area"></div>
    </div>
  </div>

  <div class="tab-panel" id="tab-encuesta">
    <div class="main">
      <div class="encuesta-wrap" id="enc-form-wrap">
        <div class="enc-card">
          <div class="enc-section">Datos del corte</div>
          <div class="field"><label># de Corte *</label><input type="text" id="e-corte"></div>
          <div class="field"><label>Programa *</label><input type="text" id="e-programa"></div>
          <div class="field"><label>Modelo *</label><input type="text" id="e-modelo"></div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div class="field"><label>Revisadas *</label><input type="number" id="e-prev"></div>
            <div class="field"><label>Recibidas *</label><input type="number" id="e-prec"></div>
          </div>
          <div class="field"><label>Auditor *</label><select id="e-auditor"><option value="">Selecciona...</option><option>Eloisa</option><option>Luis</option><option>Arely</option><option>Equipo de calidad</option></select></div>
          <div class="field"><label>Maquilero *</label><select id="e-maquilero"><option value="">Selecciona...</option></select></div>
          <div class="field"><label>Producto *</label><select id="e-tipo" onchange="actualizarPuntos()"><option value="">Selecciona...</option></select></div>
        </div>

        <div class="enc-card" id="enc-puntos-card" style="display:none;">
          <div class="enc-section" style="margin-bottom:10px; font-weight:bold;">Puntos de revisión</div>
          <div class="check-grid" id="enc-puntos-lista"></div>
        </div>

        <div class="enc-card">
          <div class="field">
            <label>Calidad General *</label>
            <div class="rating-row">
              <div class="rating-opt"><input type="radio" name="cal" id="cal1" value="1"><label for="cal1">1</label></div>
              <div class="rating-opt"><input type="radio" name="cal" id="cal2" value="2"><label for="cal2">2</label></div>
              <div class="rating-opt"><input type="radio" name="cal" id="cal3" value="3"><label for="cal3">3</label></div>
              <div class="rating-opt"><input type="radio" name="cal" id="cal4" value="4"><label for="cal4">4</label></div>
              <div class="rating-opt"><input type="radio" name="cal" id="cal5" value="5"><label for="cal5">5</label></div>
            </div>
          </div>
          <div class="field"><label>Observaciones</label><textarea id="e-obs"></textarea></div>
          <div class="enc-actions" style="text-align:right;">
            <button class="btn btn-dark" id="btn-save-audit" onclick="enviarEncuesta()">Generar auditoría →</button>
          </div>
        </div>
      </div>

      <div id="enc-success" style="display:none;" class="encuesta-wrap">
        <div class="enc-card" style="text-align:center;">
          <h3 style="color:var(--green);">✓ Registro Guardado</h3>
          <p style="margin:1rem 0;">Los datos se enviaron a Google Sheets correctamente.</p>
          <button class="btn btn-dark" onclick="verFormatoLocal()">🖨 Ver / Imprimir PDF</button>
          <button class="btn" onclick="nuevaEncuesta()">Nueva Auditoría</button>
        </div>
      </div>
    </div>
  </div>

  <div class="tab-panel" id="tab-dashboard">
    <div class="main">
        <div class="dash-card"><canvas id="chart-auditores"></canvas></div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-head"><strong>Formato de Auditoría</strong><button onclick="closeModal()" style="background:none; border:none; cursor:pointer; font-size:20px;">×</button></div>
    <div class="modal-body"><div id="formato-print"></div></div>
    <div class="modal-foot">
      <button class="btn btn-dark" onclick="imprimirFormato()">Imprimir / PDF</button>
    </div>
  </div>
</div>

<script>
const PUNTOS_POR_TIPO = {
  'filipina manga larga':['Ubicación de etiquetas','Parche emblema','División bolsa','Pespunte escote','Cuello y cruce','Ojal y botón','Terminado ojal','Cierre','Aberturas','Medida aberturas','Medida bolsa','Calidad over','Entretelas','Costuras ocultas','Broches','Traba','Elevadores','Puños','Otros'],
  'filipina manga corta':['Ubicación de etiquetas','Parche emblema','División bolsa','Pespunte escote','Cuello y cruce','Ojal y botón','Terminado ojal','Cierre','Aberturas','Medida aberturas','Medida bolsa','Calidad over','Entretelas','Costuras ocultas','Broches','Traba','Dobladillo Manga','Otros'],
  'mandil':['Consumo dobladillos','Etiqueta composición','Etiqueta emblema','Pespuntes','Hilo armado','Hilo pespunte','Bolsas','Dobladillo bolsas','Medida bolsas','Ojillo','Ancho cintas','Cierre','Remaches','Pretinas','Correderas','Presillas','Sobrehilado','Broches','Otros'],
  'pantalón':['Consumo dobladillos','Etiqueta composición','Etiqueta emblema','Pespuntes','Hilo armado','Hilo pespunte','Bolsas','Dobladillo bolsas','Medida bolsas','Resorte','Ancho cintas','Cierre','Remaches','Correderas','Presillas','Sobrehilado','Broches','Otros']
};

const CREDENCIALES = {'Admin':'admin2026','Eloisa':'3loi$a2026','Luis':'lui$2026','Arely':'arely2026','Equipo de calidad':'calidad2024'};
const CSV_URL='https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Ac4R1rHVKvGYJS1o4zV9Dy-Up_1su7FKtdcNRHvfC85DwxyCsxYz8lG8u_xsbPE_xy_Nc_DGhHnZ/pub?gid=1504659397&single=true&output=csv';
const FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSfhtVK_dHmbnJsgD2QawkKy39SZiLiKn-SoHZv3UqE7GpOw-w/formResponse";

let allData=[], filtered=[], config={maquileros:[], tipos:[]}, lastEncuesta=null;

// AUTH
function doLogin(){
  const user=document.getElementById('login-user').value;
  const pass=document.getElementById('login-pass').value;
  if(CREDENCIALES[user]===pass){
    sessionStorage.setItem('auditorActivo',user);
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-shell').style.display='block';
    document.getElementById('topbar-user').textContent=`Sesión: ${user}`;
    if(user==='Admin') document.querySelectorAll('.master-only').forEach(el=>el.style.display='block');
    loadData();
  } else alert('Contraseña incorrecta');
}
function doLogout(){ location.reload(); }

// DATA
async function loadData(){
  try {
    const res=await fetch(CSV_URL);
    const txt=await res.text();
    const rows=txt.split('\n').map(r=>r.split(','));
    allData=rows.slice(1);
    filtered=[...allData];
    renderTable();
    actualizarStats();
    cargarSelectsEncuesta();
    document.getElementById('stats').style.display='grid';
    document.getElementById('controls').style.display='flex';
  } catch(e){ console.error(e); }
}

function actualizarStats(){
    document.getElementById('s-total').textContent=allData.length;
    document.getElementById('s-maq').textContent=new Set(allData.map(r=>r[8])).size;
}

function renderTable(){
  let html='<div class="table-card"><table><thead><tr><th>Fecha</th><th>Corte</th><th>Modelo</th><th>Maquilero</th><th>Calif</th><th></th></tr></thead><tbody>';
  filtered.slice(-20).reverse().forEach(r=>{
    html+=`<tr><td>${r[0].split(' ')[0]}</td><td>${r[2]}</td><td>${r[4]}</td><td>${r[8]}</td><td>${r[10]}</td><td><button class="btn btn-sm" onclick="verRegistro(${allData.indexOf(r)})">PDF</button></td></tr>`;
  });
  html+='</tbody></table></div>';
  document.getElementById('table-area').innerHTML=html;
}

function filterData(){
    const q=document.getElementById('search').value.toLowerCase();
    filtered=allData.filter(r=>r.join(' ').toLowerCase().includes(q));
    renderTable();
}

// ENCUESTA
function cargarSelectsEncuesta(){
    const maqs = [...new Set(allData.map(r=>r[8]).filter(Boolean))].sort();
    const mSel=document.getElementById('e-maquilero'); mSel.innerHTML='<option value="">Selecciona...</option>';
    maqs.forEach(m=>mSel.innerHTML+=`<option>${m}</option>`);
    const tSel=document.getElementById('e-tipo'); tSel.innerHTML='<option value="">Selecciona...</option>';
    Object.keys(PUNTOS_POR_TIPO).forEach(t=>tSel.innerHTML+=`<option>${t}</option>`);
}

function actualizarPuntos(){
  const tipo=document.getElementById('e-tipo').value;
  const puntos=PUNTOS_POR_TIPO[tipo] || [];
  const lista=document.getElementById('enc-puntos-lista');
  lista.innerHTML=puntos.map((p,i)=>`<label class="check-item" id="ci-${i}" onclick="toggleCheck(${i})"><input type="checkbox" id="chk-${i}" style="display:none"><span>${p}</span></label>`).join('');
  document.getElementById('enc-puntos-card').style.display=puntos.length?'block':'none';
}

function toggleCheck(i){
    const el=document.getElementById(`ci-${i}`);
    el.classList.toggle('checked');
    document.getElementById(`chk-${i}`).checked=el.classList.contains('checked');
}

async function enviarEncuesta(){
    const btn = document.getElementById('btn-save-audit');
    const d={
        corte: document.getElementById('e-corte').value,
        prog: document.getElementById('e-programa').value,
        mod: document.getElementById('e-modelo').value,
        prev: document.getElementById('e-prev').value,
        prec: document.getElementById('e-prec').value,
        auditor: document.getElementById('e-auditor').value,
        maq: document.getElementById('e-maquilero').value,
        tipo: document.getElementById('e-tipo').value,
        cal: document.querySelector('input[name="cal"]:checked')?.value,
        obs: document.getElementById('e-obs').value
    };

    if(!d.corte || !d.cal) return alert('Faltan campos críticos');

    const puntos=[]; document.querySelectorAll('.check-item.checked span').forEach(s=>puntos.push(s.textContent));
    lastEncuesta = {...d, puntos, fecha: new Date()};

    const form = new URLSearchParams();
    form.append("entry.1491873105", d.corte);
    form.append("entry.444265449", d.prog);
    form.append("entry.2123547144", d.mod);
    form.append("entry.1983088219", d.prev);
    form.append("entry.2064560738", d.prec);
    form.append("entry.1458925916", d.auditor);
    form.append("entry.443183597", d.maq);
    form.append("entry.686618721", d.tipo);
    form.append("entry.1593339343", d.cal);
    form.append("entry.1465243454", d.obs);
    form.append("entry.1843236055", puntos.join(', '));

    btn.disabled=true; btn.textContent="Guardando...";
    try {
        await fetch(FORM_ACTION, { method: "POST", mode: "no-cors", body: form });
        document.getElementById('enc-form-wrap').style.display='none';
        document.getElementById('enc-success').style.display='block';
    } catch(e) { alert('Error al guardar'); }
    btn.disabled=false; btn.textContent="Generar auditoría →";
}

function nuevaEncuesta(){ location.reload(); }

// PDF
function verFormatoLocal(){
  const e=lastEncuesta;
  const html=`<div style="padding:10px; border:2px solid #000;">
    <div style="text-align:center; background:#000; color:#fff; padding:5px; font-weight:bold;">AUDITORÍA DE CALIDAD</div>
    <table style="width:100%; margin-top:10px; border-collapse:collapse;">
        <tr><td class="lbl">Corte:</td><td>${e.corte}</td><td class="lbl">Modelo:</td><td>${e.mod}</td></tr>
        <tr><td class="lbl">Maquilero:</td><td colspan="3">${e.maq}</td></tr>
        <tr><td class="lbl">Revisó:</td><td>${e.auditor}</td><td class="lbl">Calif:</td><td>${e.cal}/5</td></tr>
    </table>
    <div style="margin-top:10px; font-weight:bold; font-size:12px;">Puntos Revisados:</div>
    <div style="font-size:11px;">${e.puntos.join(' • ')}</div>
    <div style="margin-top:10px; font-weight:bold; font-size:12px;">Observaciones:</div>
    <div style="font-size:11px; border:1px solid #ccc; padding:5px; min-height:50px;">${e.obs}</div>
  </div>`;
  document.getElementById('formato-print').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
}

function verRegistro(idx){
    const r=allData[idx];
    lastEncuesta = { corte:r[2], mod:r[4], maq:r[8], auditor:r[7], cal:r[10], puntos:[r[11]], obs:r[12], fecha:r[0] };
    verFormatoLocal();
}

function closeModal(){ document.getElementById('overlay').classList.remove('open'); }

function imprimirFormato(){
    const content = document.getElementById('formato-print').innerHTML;
    const win = window.open('', '', 'height=700,width=900');
    win.document.write('<html><head><title>Imprimir</title><style>.lbl{font-weight:bold; background:#eee;} td{border:1px solid #000; padding:5px;}</style></head><body>');
    win.document.write(content);
    win.document.write('</body></html>');
    win.document.close();
    win.print();
}

// TABS
function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}
</script>
