<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoría de Producto Terminado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;
    --border:#e0ddd4;--border2:#c8c5ba;
    --text:#1a1917;--text2:#6b6860;--text3:#9e9b92;
    --green:#2d6a4f;--green-bg:#d8f3dc;
    --amber:#7d4e00;--amber-bg:#fff3cd;
    --red:#7f1d1d;--red-bg:#fee2e2;
    --blue:#1e3a5f;--blue-bg:#dbeafe;
    --radius:10px;--radius-sm:6px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* LOGIN */
  .login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg);}
  .login-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center;}
  .login-logo{font-size:28px;font-weight:300;letter-spacing:-1px;margin-bottom:6px;}
  .login-sub{font-size:13px;color:var(--text3);margin-bottom:2rem;font-family:'DM Mono',monospace;}
  .login-card input{width:100%;padding:10px 14px;border:0.5px solid var(--border);border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--surface);outline:none;margin-bottom:10px;}
  .login-card input:focus{border-color:var(--border2);}
  .login-card .btn-full{width:100%;padding:11px;background:var(--text);color:#fff;border:none;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;}
  .login-card .btn-full:hover{opacity:0.85;}
  .login-err{font-size:12px;color:var(--red);margin-top:8px;display:none;}

  /* APP SHELL */
  .app-shell{display:none;}
  .topbar{background:var(--text);color:#fff;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
  .topbar-title{font-size:15px;font-weight:600;letter-spacing:-0.3px;}
  .topbar-sub{font-size:12px;opacity:0.5;font-family:'DM Mono',monospace;}
  .topbar-right{display:flex;align-items:center;gap:8px;}
  .tabs-bar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 2rem;display:flex;gap:0;}
  .tab-btn{padding:12px 20px;font-size:13px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;font-family:'DM Sans',sans-serif;}
  .tab-btn:hover{color:var(--text2);}
  .tab-btn.active{color:var(--text);border-bottom-color:var(--text);}
  .tab-panel{display:none;}
  .tab-panel.active{display:block;}
  .main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}

  /* STATS */
  .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
  .stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1rem 1.25rem;}
  .stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px;font-family:'DM Mono',monospace;}
  .stat-value{font-size:28px;font-weight:300;letter-spacing:-1px;}
  .stat-sub{font-size:12px;color:var(--text3);margin-top:2px;}

  /* CONTROLS */
  .controls-bar{display:flex;gap:10px;margin-bottom:1.25rem;flex-wrap:wrap;align-items:center;}
  .search-wrap{position:relative;flex:1;min-width:200px;}
  .search-wrap input{width:100%;padding:9px 12px 9px 36px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;}
  .search-wrap input:focus{border-color:var(--border2);}
  .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
  select{padding:9px 12px;border:0.5px solid var(--border);border-radius:var(--radius-sm);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);outline:none;cursor:pointer;}
  .btn{padding:9px 18px;border-radius:var(--radius-sm);border:0.5px solid var(--border);background:var(--surface);font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text);cursor:pointer;transition:all 0.15s;white-space:nowrap;}
  .btn:hover{background:var(--surface2);border-color:var(--border2);}
  .btn-dark{background:var(--text);color:#fff;border-color:var(--text);}
  .btn-dark:hover{opacity:0.85;}
  .btn-sm{padding:5px 12px;font-size:12px;}
  .count-label{font-size:12px;color:var(--text3);margin-left:auto;font-family:'DM Mono',monospace;}

  /* TABLE */
  .table-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .table-wrap{overflow-x:auto;}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:860px;}
  thead th{background:var(--surface2);padding:10px 14px;text-align:left;font-weight:500;font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:0.4px;border-bottom:0.5px solid var(--border);font-family:'DM Mono',monospace;white-space:nowrap;cursor:pointer;user-select:none;}
  thead th:hover{color:var(--text2);}
  tbody td{padding:11px 14px;border-bottom:0.5px solid var(--border);vertical-align:middle;}
  tbody tr:last-child td{border-bottom:none;}
  tbody tr:hover td{background:var(--bg);}
  .mono{font-family:'DM Mono',monospace;font-size:12px;}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;}
  .badge-green{background:var(--green-bg);color:var(--green);}
  .badge-amber{background:var(--amber-bg);color:var(--amber);}
  .badge-blue{background:var(--blue-bg);color:var(--blue);}
  .badge-gray{background:var(--surface2);color:var(--text2);border:0.5px solid var(--border);}
  .score-dot{display:inline-flex;align-items:center;gap:5px;font-weight:500;font-size:13px;}
  .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
  .dot-green{background:var(--green);}
  .dot-amber{background:#d97706;}
  .dot-red{background:#dc2626;}
  .empty-state{text-align:center;padding:4rem 2rem;color:var(--text3);}
  .empty-state .empty-icon{font-size:40px;margin-bottom:1rem;opacity:0.4;}
  .empty-state p{font-size:14px;}
  .alert{padding:12px 16px;border-radius:var(--radius-sm);font-size:13px;margin-bottom:1rem;}
  .alert-error{background:var(--red-bg);color:var(--red);border:0.5px solid #fca5a5;}
  .alert-success{background:var(--green-bg);color:var(--green);border:0.5px solid #86efac;}
  .alert-info{background:var(--blue-bg);color:var(--blue);border:0.5px solid #93c5fd;}

  /* MODAL */
  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:1rem;}
  .overlay.open{display:flex;}
  .modal{background:var(--surface);border-radius:var(--radius);border:0.5px solid var(--border);width:100%;max-width:820px;max-height:92vh;display:flex;flex-direction:column;}
  .modal-head{padding:1rem 1.5rem;border-bottom:0.5px solid var(--border);display:flex;align-items:center;justify-
