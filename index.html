<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoría de Producto Terminado</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--border:#e0ddd4;--border2:#c8c5ba;--text:#1a1917;--text2:#6b6860;--text3:#9e9b92;--green:#2d6a4f;--green-bg:#d8f3dc;--amber:#7d4e00;--amber-bg:#fff3cd;--red:#7f1d1d;--red-bg:#fee2e2;--blue:#1e3a5f;--blue-bg:#dbeafe;--radius:10px;--radius-sm:6px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;width:100%;max-width:360px;text-align:center;}
.login-card select, .login-card input{width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:1px solid var(--border);outline:none;}
.app-shell{display:none;}
.topbar{background:var(--text);color:#fff;padding:0 2rem;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
.tabs-bar{background:var(--surface);border-bottom:0.5px solid var(--border);padding:0 2rem;display:flex;}
.tab-btn{padding:15px 20px;font-size:13px;font-weight:500;color:var(--text3);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text);}
.main{max-width:1200px;margin:0 auto;padding:2rem 1.5rem;}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.5rem;}
.stat-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.25rem;}
.stat-label{font-size:11px;color:var(--text3);text-transform:uppercase;font-family:'DM Mono';}
.stat-value{font-size:28px;font-weight:300;}
.table-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);overflow:hidden;}
.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13px;min-width:800px;}
thead th{background:var(--surface2);padding:12px;text-align:left;color:var(--text3);font-family:'DM Mono';font-size:11px;text-transform:uppercase;}
tbody td{padding:12px;border-bottom:0.5px solid var(--border);vertical-align:middle;}
.encuesta-wrap{max-width:700px;margin:0 auto;}
.enc-card{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1rem;}
.field{margin-bottom:1.25rem;}
.field label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;}
.field input, .field select, .field textarea{width:100%;padding:10px;border:0.5px solid var(--border);border-radius:6px;}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.check-item{padding:10px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;}
.check-item.checked{background:var(--text);color:#fff;}
.btn-dark{background:var(--text);color:#fff;padding:12px 24px;border-radius:6px;border:none;cursor:pointer;font-weight:600;width:100%;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;}
.overlay.open{display:flex;}
.modal{background:#fff; padding:2rem; border-radius:12px; width:90%; max-width:800px;}
@media(max-width:750px){.stats-grid{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>

<div class="login-screen" id="login-screen">
    <div class="login-card">
        <h2 style="margin-bottom:20px; font-weight:300;">Auditoría PT</h2>
        <select id="login-user">
            <option value="">Seleccionar Usuario</option>
            <option value="Admin">Admin</option>
            <option value="Eloisa">Eloisa</option>
            <option value="Luis">Luis</option>
            <option value="Arely">Arely</option>
            <option value="Equipo de calidad">Equipo de calidad</option>
        </select>
        <input type="password" id="login-pass" placeholder="Contraseña">
        <button class="btn-dark" onclick="doLogin()">Entrar</button>
    </div>
</div>

<div class="app-shell" id="app-shell">
    <div class="topbar">
        <div style="font-weight:600;">Panel de Calidad</div>
        <button onclick="location.reload()" style="background:none; border:none; color:#fff; cursor:pointer;">Cerrar Sesión</button>
    </div>
    <div class="tabs-bar">
        <button class="tab-btn active" onclick="switchTab('registros',this)">Registros</button>
        <button class="tab-btn" onclick="switchTab('encuesta',this)">Nueva Auditoría</button>
    </div>

    <div class="tab-panel active" id="tab-registros">
        <div class="main">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value" id="s-total">0</div></div>
                <div class="stat-card"><div class="stat-label">Promedio</div><div class="stat-value" id="s-avg">0</div></div>
                <div class="stat-card"><div class="stat-label">Maquileros</div><div class="stat-value" id="s-maq">0</div></div>
                <div class="stat-card"><div class="stat-label">Este Mes</div><div class="stat-value" id="s-mes">0</div></div>
            </div>
            <div class="table-card">
                <div class="table-wrap">
                    <table id="main-table">
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Corte</th>
                                <th>Modelo</th>
                                <th>Maquilero</th>
                                <th>Calif.</th>
                            </tr>
                        </thead>
                        <tbody id="table-body">
                            <tr><td colspan="5" style="text-align:center; padding:2rem;">Cargando datos...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="tab-panel" id="tab-encuesta">
        <div class="main">
            <div class="encuesta-wrap" id="enc-form-wrap">
                <div class="enc-card">
                    <div class="field"><label># Corte</label><input type="text" id="e-corte"></div>
                    <div class="field"><label>Modelo</label><input type="text" id="e-modelo"></div>
                    <div class="field"><label>Maquilero</label><select id="e-maquilero"></select></div>
                    <div class="field"><label>Producto</label><select id="e-tipo" onchange="actualizarPuntos()"></select></div>
                </div>
                <div class="enc-card" id="enc-puntos-card" style="display:none;">
                    <div class="check-grid" id="enc-puntos-lista"></div>
                </div>
                <div class="enc-card">
                    <button class="btn-dark" id="btn-envio" onclick="enviarEncuesta()">Guardar y Generar PDF</button>
                </div>
            </div>
            <div id="enc-success" style="display:none; text-align:center;">
                <div class="enc-card">
                    <h2 style="color:var(--green);">✓ Guardado</h2>
                    <button class="btn-dark" onclick="verFormatoLocal()" style="margin-top:10px;">Ver Formato</button>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay" onclick="this.classList.remove('open')">
    <div class="modal" onclick="event.stopPropagation()">
        <div id="formato-print"></div>
        <button class="btn-dark" onclick="window.print()" style="margin-top:20px;">Imprimir</button>
    </div>
</div>

<script>
const CREDS = {'Admin':'admin2026','Eloisa':'3loi$a2026','Luis':'lui$2026','Arely':'arely2026','Equipo de calidad':'calidad2024'};
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vS0Ac4R1rHVKvGYJS1o4zV9Dy-Up_1su7FKtdcNRHvfC85DwxyCsxYz8lG8u_xsbPE_xy_Nc_DGhHnZ/pub?gid=1504659397&single=true&output=csv';
const FORM_URL = "https://docs.google.com/forms/d/e/1FAIpQLSfhtVK_dHmbnJsgD2QawkKy39SZiLiKn-SoHZv3UqE7GpOw-w/formResponse";

let allData = [];

// Función para procesar CSV de forma robusta
function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    return lines.map(line => {
        const result = [];
        let cur = "";
        let inQuotes = false;
        for (let i = 0; i < line.length; i++) {
            let char = line[i];
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) {
                result.push(cur.trim());
                cur = "";
            } else cur += char;
        }
        result.push(cur.trim());
        return result;
    });
}

async function loadData(){
    try {
        const response = await fetch(CSV_URL);
        const text = await response.text();
        const rows = parseCSV(text);
        
        // El CSV tiene encabezados en la fila 0. Filtramos filas vacías.
        allData = rows.slice(1).filter(r => r.length > 5 && r[1] !== "");
        
        renderTable();
        actualizarStats();
        cargarMaquileros();
    } catch (e) {
        console.error("Error cargando datos:", e);
    }
}

function renderTable(){
    const tbody = document.getElementById('table-body');
    let html = "";
    
    // Basado en tu captura, mapeamos las columnas manualmente:
    // 0: Fecha, 2: Corte, 4: Modelo, 8: Maquilero, 10: Promedio
    allData.slice().reverse().slice(0,50).forEach(r => {
        html += `<tr>
            <td>${r[0] || '—'}</td>
            <td><b>${r[2] || '—'}</b></td>
            <td>${r[4] || '—'}</td>
            <td>${r[8] || '—'}</td>
            <td><span style="font-weight:bold; color:var(--green);">${r[10] || '—'}</span></td>
        </tr>`;
    });
    tbody.innerHTML = html;
}

function actualizarStats(){
    document.getElementById('s-total').textContent = allData.length;
    const proms = allData.map(r => parseFloat(r[10])).filter(v => !isNaN(v));
    const avg = proms.length ? (proms.reduce((a,b)=>a+b,0)/proms.length).toFixed(1) : '—';
    document.getElementById('s-avg').textContent = avg;
    document.getElementById('s-maq').textContent = new Set(allData.map(r => r[8])).size;
}

function cargarMaquileros(){
    const m = [...new Set(allData.map(r => r[8]).filter(Boolean))].sort();
    const sel = document.getElementById('e-maquilero');
    sel.innerHTML = '<option value="">Seleccionar...</option>' + m.map(x => `<option value="${x}">${x}</option>`).join('');
    
    const tSel = document.getElementById('e-tipo');
    const tipos = ['filipina manga larga','filipina manga corta','mandil','pantalón'];
    tSel.innerHTML = '<option value="">Seleccionar...</option>' + tipos.map(x => `<option value="${x}">${x}</option>`).join('');
}

function doLogin(){
    const u = document.getElementById('login-user').value;
    const p = document.getElementById('login-pass').value;
    if(CREDS[u] === p){
        sessionStorage.setItem('auditor', u);
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-shell').style.display = 'block';
        loadData();
    } else alert("Acceso denegado");
}

function switchTab(n, b){
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('tab-'+n).classList.add('active');
    b.classList.add('active');
}

// Envío directo a Google Form
async function enviarEncuesta(){
    const d = {
        corte: document.getElementById('e-corte').value,
        mod: document.getElementById('e-modelo').value,
        maq: document.getElementById('e-maquilero').value,
        auditor: sessionStorage.getItem('auditor')
    };
    
    if(!d.corte || !d.maq) return alert("Faltan datos");

    const f = new URLSearchParams();
    f.append("entry.1491873105", d.corte);
    f.append("entry.2123547144", d.mod);
    f.append("entry.1458925916", d.auditor);
    f.append("entry.443183597", d.maq);

    document.getElementById('btn-envio').textContent = "Guardando...";
    await fetch(FORM_URL, {method:"POST", mode:"no-cors", body:f});
    
    document.getElementById('enc-form-wrap').style.display = 'none';
    document.getElementById('enc-success').style.display = 'block';
}
</script>
</body>
</html>
